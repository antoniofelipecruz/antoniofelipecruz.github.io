<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC - Shepherd</title>
    <style>
        :root {
            --primary-blue: #007bff;
            --dark-blue: #1a2a3a;
            --bg-dark: #121212;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--dark-blue);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
            border-top: 5px solid var(--primary-blue);
        }

        h2 { margin-bottom: 1.5rem; }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: #2c3e50;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        button:hover { background-color: #0056b3; }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 5px;
            display: none;
        }

        .status-normal { color: #2ecc71; }
        .status-alert { color: #f1c40f; }
        .status-danger { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora IMC</h2>
    
    <div class="input-group">
        <label>Peso (kg)</label>
        <input type="number" id="weight" placeholder="Ex: 75.5" step="0.1">
    </div>

    <div class="input-group">
        <label>Altura (m)</label>
        <input type="number" id="height" placeholder="Ex: 1.75" step="0.01">
    </div>

    <button onclick="calculateIMC()">Calcular Agora</button>

    <div id="result"></div>
</div>

<script>
    function calculateIMC() {
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;
        const resultDiv = document.getElementById('result');

        if (weight > 0 && height > 0) {
            const imc = (weight / (height * height)).toFixed(2);
            let classification = '';
            let colorClass = '';

            if (imc < 18.5) {
                classification = 'Abaixo do peso';
                colorClass = 'status-alert';
            } else if (imc < 25) {
                classification = 'Peso normal';
                colorClass = 'status-normal';
            } else if (imc < 30) {
                classification = 'Sobrepeso';
                colorClass = 'status-alert';
            } else {
                classification = 'Obesidade';
                colorClass = 'status-danger';
            }

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `Seu IMC é <strong>${imc}</strong><br><span class="${colorClass}">${classification}</span>`;
        } else {
            alert("Por favor, preencha os valores corretamente.");
        }
    }
</script>

</body>
</html>
